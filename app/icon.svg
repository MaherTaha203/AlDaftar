<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- الدفتر — «الدال المنحوتة»: the letter د carved from the Royal Emerald
       tile, with the copper identity dot. Mirrors components/app/brand-mark.tsx
       (static favicons cannot read CSS tokens — keep in sync). Stroke is a
       touch thicker than the in-app mark so the د survives 16px rendering. -->
  <rect width="96" height="96" rx="24" fill="#0c6e5f" />
  <path
    d="M34 30c14 0 24 8 24 20 0 6-3 11-8 14H27"
    fill="none"
    stroke="#ffffff"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="66" cy="66" r="5" fill="#c98d5a" />
</svg>
